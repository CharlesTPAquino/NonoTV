<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>NonoTV — Premium IPTV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body { background: #000; color: #fff; margin: 0; font-family: sans-serif; }
      #debug-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 9999; display: none;
        padding: 20px; box-sizing: border-box; overflow: auto;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="debug-overlay">
      <h1 style="color: #ff4d4d">NonoTV Crash Report</h1>
      <pre id="debug-content" style="white-space: pre-wrap; word-break: break-all;"></pre>
      <button onclick="window.location.reload()" style="padding: 10px 20px; background: #fff; color: #000; border: none; border-radius: 5px; cursor: pointer;">Recarregar App</button>
    </div>

    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var overlay = document.getElementById('debug-overlay');
        var content = document.getElementById('debug-content');
        overlay.style.display = 'block';
        content.textContent = "ERRO: " + msg + "\nURL: " + url + "\nLINHA: " + lineNo + "\nCOL: " + columnNo + "\nSTACK: " + (error ? error.stack : "N/A");
        return false;
      };
      
      window.onunhandledrejection = function(event) {
        var overlay = document.getElementById('debug-overlay');
        var content = document.getElementById('debug-content');
        overlay.style.display = 'block';
        content.textContent = "PROMISE REJECTED: " + event.reason;
      };
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
